  <meta charset="UTF-8" />

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --surface: #111;
      --surface2: #181818;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #c8a96e;
      --red: #a33;
      --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-serif: Georgia, 'Times New Roman', serif;
      --sidebar: 240px;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 17px;
      color: var(--accent);
      font-weight: normal;
    }

    .sidebar-header p {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .album-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 8px 0;
    }

    .album-list::-webkit-scrollbar { display: none; }

    .album-row {
      display: flex;
      align-items: center;
      border-left: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s, opacity 0.2s;
    }

    .album-row.active {
      border-left-color: var(--accent);
      background: rgba(200,169,110,0.06);
    }

    .album-row.drag-over-row {
      border-top: 1px solid var(--accent);
    }

    .album-row.deleted {
      opacity: 0.35;
    }

    .drag-handle {
      padding: 0 6px 0 10px;
      color: var(--border);
      font-size: 13px;
      cursor: grab;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
      align-self: stretch;
      display: flex;
      align-items: center;
    }

    .album-row:hover .drag-handle { opacity: 1; color: var(--muted); }

    .album-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 9px 6px 9px 0;
      text-align: left;
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.15s;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-btn:hover { color: var(--text); }
    .album-row.active .album-btn { color: var(--accent); }
    .album-row.deleted .album-btn { text-decoration: line-through; pointer-events: none; }

    .album-btn .num {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
      width: 18px;
    }

    .album-row.active .album-btn .num { color: var(--accent); }

    .album-btn .changed-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      display: none;
    }

    .album-row.changed .changed-dot { display: block; }

    .album-action {
      padding: 0 10px 0 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      color: var(--border);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .album-row:hover .album-action { opacity: 1; }
    .album-action.delete:hover { color: var(--red); }
    .album-action.restore { color: var(--accent); opacity: 1; }
    .album-action.restore:hover { color: #d4b97a; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: bold;
    }

    .btn-primary:hover { background: #d4b97a; border-color: #d4b97a; color: #000; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .file-hint {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .file-hint .file-name {
      color: var(--accent);
      display: block;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── MAIN ────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .toolbar h2 {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 18px;
      font-weight: normal;
      color: var(--text);
      flex: 1;
    }

    .toolbar .count {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .toolbar-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .toolbar-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── GRID ────────────────────────────────────────────── */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: grab;
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.15s;
      user-select: none;
    }

    .photo-item[data-landscape] { aspect-ratio: 3/2; }

    .photo-item:hover { border-color: var(--muted); }
    .photo-item.dragging { opacity: 0.3; cursor: grabbing; }
    .photo-item.drag-over { border-color: var(--accent); border-style: dashed; }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .photo-item .index-badge {
      position: absolute;
      top: 5px; left: 5px;
      background: rgba(0,0,0,0.75);
      color: var(--accent);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 5px;
      pointer-events: none;
    }

    .photo-item .preview-badge {
      position: absolute;
      top: 5px; right: 5px;
      background: var(--accent);
      color: #000;
      font-size: 8px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 5px;
      pointer-events: none;
    }

    .photo-item .filename {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: var(--muted);
      font-size: 8px;
      padding: 3px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .photo-item:hover .filename { opacity: 1; }

    .photo-remove {
      position: absolute;
      bottom: 5px; right: 5px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #555;
      color: #ccc;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      pointer-events: none;
    }

    .photo-item:hover .photo-remove {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-remove:hover { background: var(--red); border-color: var(--red); color: #fff; }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2000;
    }

    .toast.error { background: #922; color: #fff; }
    .toast.show { opacity: 1; }
  </style>
</head>

</div>

// ── STATE ─────────────────────────────────────────────────────────
const photoState    = {};  // per-album photo ordering
const photoOriginal = {};  // original photo ordering

GALLERIES.forEach(g => {
  photoState[g.id]    = g.images.map(img => ({ ...img }));
  photoOriginal[g.id] = g.images.map(img => ({ ...img }));
});

// Album order & deletion
let albumOrder    = GALLERIES.map(g => g.id);
const origOrder   = GALLERIES.map(g => g.id);
const deletedAlbums = new Set();

let activeId       = null;
let savedFileHandle = null;

// ── SIDEBAR ───────────────────────────────────────────────────────
let sidebarDragSrc = null;

function renderSidebar() {
  const list = document.getElementById('albumList');
  list.innerHTML = '';

  albumOrder.forEach((id, idx) => {
    const g = GALLERIES.find(x => x.id === id);
    const visibleIdx = albumOrder.slice(0, idx + 1).filter(i => !deletedAlbums.has(i)).indexOf(id);
    const num = String(visibleIdx + 1).padStart(2, '0');
    const isDel = deletedAlbums.has(id);

    const photoChanged = photoState[id].length !== photoOriginal[id].length ||
      photoState[id].some((img, i) => img.src !== photoOriginal[id][i]?.src);
    const structureChanged = isDel || idx !== origOrder.indexOf(id);

    const row = document.createElement('div');
    row.className = 'album-row' +
      (id === activeId && !isDel ? ' active' : '') +
      (isDel ? ' deleted' : '') +
      ((photoChanged || structureChanged) ? ' changed' : '');
    row.dataset.id = id;

    // Drag handle
    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.setAttribute('draggable', 'false');

    // Main button
    const btn = document.createElement('button');
    btn.className = 'album-btn';
    btn.innerHTML = `<span class="num">${isDel ? '—' : num}</span>${g.title}<span class="changed-dot"></span>`;
    if (!isDel) {
      btn.addEventListener('click', () => selectAlbum(id));
    }

    // Delete / restore button
    const action = document.createElement('button');
    if (isDel) {
      action.className = 'album-action restore';
      action.textContent = '↺';
      action.title = 'Restore album';
      action.addEventListener('click', e => { e.stopPropagation(); restoreAlbum(id); });
    } else {
      action.className = 'album-action delete';
      action.textContent = '×';
      action.title = 'Remove from site';
      action.addEventListener('click', e => { e.stopPropagation(); deleteAlbum(id); });
    }

    row.appendChild(handle);
    row.appendChild(btn);
    row.appendChild(action);

    // Sidebar drag-to-reorder (via the handle or the row itself)
    row.draggable = true;
    row.addEventListener('dragstart', e => {
      sidebarDragSrc = idx;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setDragImage(row, 20, 14);
      setTimeout(() => row.style.opacity = '0.4', 0);
    });
    row.addEventListener('dragend', () => {
      row.style.opacity = '';
      list.querySelectorAll('.album-row').forEach(r => r.classList.remove('drag-over-row'));
    });
    row.addEventListener('dragover', e => {
      // Only handle sidebar drags (not photo drags)
      if (sidebarDragSrc === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.album-row').forEach(r => r.classList.remove('drag-over-row'));
      row.classList.add('drag-over-row');
    });
    row.addEventListener('drop', e => {
      if (sidebarDragSrc === null) return;
      e.preventDefault();
      const destIdx = idx;
      if (sidebarDragSrc === destIdx) return;
      const [moved] = albumOrder.splice(sidebarDragSrc, 1);
      albumOrder.splice(destIdx, 0, moved);
      sidebarDragSrc = null;
      renderSidebar();
    });

    list.appendChild(row);
  });
}

function selectAlbum(id) {
  activeId = id;
  document.getElementById('emptyState').style.display = 'none';
  renderSidebar();
  renderGrid(id);
}

function deleteAlbum(id) {
  deletedAlbums.add(id);
  if (activeId === id) {
    activeId = null;
    document.getElementById('albumTitle').textContent = 'Select an album';
    document.getElementById('albumCount').textContent = '';
    document.getElementById('photoGrid').innerHTML = '';
    document.getElementById('emptyState').style.display = '';
  }
  renderSidebar();
}

function restoreAlbum(id) {
  deletedAlbums.delete(id);
  renderSidebar();
}

// ── FILMSTRIP ─────────────────────────────────────────────────────
const strip   = document.getElementById('photoGrid');
const titleEl = document.getElementById('albumTitle');
const countEl = document.getElementById('albumCount');

let photoDragSrc = null;

function renderGrid(id) {
  const g = GALLERIES.find(x => x.id === id);
  titleEl.textContent = g.title;
  const imgs = photoState[id];
  countEl.textContent = imgs.length + ' photos';
  strip.innerHTML = '';
  strip.scrollLeft = 0;

  imgs.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.draggable = true;
    item.dataset.index = i;
    if (img.w > img.h) item.dataset.landscape = '1';

    const badge = document.createElement('span');
    badge.className = 'index-badge';
    badge.textContent = i + 1;

    const image = document.createElement('img');
    image.src = img.src;
    image.loading = 'lazy';

    const fname = document.createElement('span');
    fname.className = 'filename';
    fname.textContent = img.src.split('/').pop();

    item.appendChild(badge);
    item.appendChild(image);
    item.appendChild(fname);

    if (i === 0) {
      const preview = document.createElement('span');
      preview.className = 'preview-badge';
      preview.textContent = 'Preview';
      item.appendChild(preview);
    }

    const removeBtn = document.createElement('span');
    removeBtn.className = 'photo-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove photo';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      photoState[id].splice(i, 1);
      renderGrid(id);
      renderSidebar();
    });
    item.appendChild(removeBtn);

    item.addEventListener('dragstart', e => {
      photoDragSrc = i;
      sidebarDragSrc = null; // ensure sidebar drag is cleared
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    item.addEventListener('dragend', () => {
      photoDragSrc = null;
      item.classList.remove('dragging');
      strip.querySelectorAll('.photo-item').forEach(el => el.classList.remove('drag-over'));
    });

    item.addEventListener('dragover', e => {
      if (photoDragSrc === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      strip.querySelectorAll('.photo-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    item.addEventListener('drop', e => {
      if (photoDragSrc === null) return;
      e.preventDefault();
      const destIdx = parseInt(item.dataset.index);
      if (photoDragSrc === destIdx) return;
      const arr = photoState[id];
      const [moved] = arr.splice(photoDragSrc, 1);
      arr.splice(destIdx, 0, moved);
      markPhotoChanged(id);
      renderGrid(id);
      renderSidebar();
    });

    strip.appendChild(item);
  });
}

function markPhotoChanged(id) {
  // Sidebar re-render will pick up changes via photoState comparison
}

// ── TOOLBAR ───────────────────────────────────────────────────────
document.getElementById('reverseBtn').addEventListener('click', () => {
  if (!activeId) return;
  photoState[activeId].reverse();
  renderGrid(activeId);
  renderSidebar();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!activeId) return;
  photoState[activeId] = photoOriginal[activeId].map(img => ({ ...img }));
  renderGrid(activeId);
  renderSidebar();
});

// ── SAVE TO INDEX.HTML ────────────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', saveToIndexHtml);

async function saveToIndexHtml() {
  const activeIds = albumOrder.filter(id => !deletedAlbums.has(id));

  const anyChange =
    deletedAlbums.size > 0 ||
    albumOrder.some((id, i) => id !== origOrder[i]) ||
    GALLERIES.some(g => photoState[g.id].some((img, i) => img.src !== photoOriginal[g.id][i]?.src));

  if (!anyChange) {
    showToast('No changes to save', false);
    return;
  }

  if (!savedFileHandle) {
    if (!window.showOpenFilePicker) {
      showToast('File System API not supported — use Chrome/Edge', true);
      return;
    }
    try {
      [savedFileHandle] = await window.showOpenFilePicker({
        types: [{ description: 'HTML Files', accept: { 'text/html': ['.html'] } }],
        excludeAcceptAllOption: false,
      });
      document.getElementById('fileHint').innerHTML =
        `Linked to: <span class="file-name">${savedFileHandle.name}</span>`;
    } catch (e) {
      return;
    }
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  try {
    const file = await savedFileHandle.getFile();
    const content = await file.text();

    // Parse with DOMParser for reliable DOM manipulation
    const parser = new DOMParser();
    const doc = parser.parseFromString(content, 'text/html');

    // Collect all existing gallery-outer sections by id
    const sectionMap = {};
    doc.querySelectorAll('.gallery-outer[id]').forEach(el => {
      sectionMap[el.id] = el;
    });

    // Update photo order inside each active gallery's track
    activeIds.forEach(id => {
      const section = sectionMap[id];
      if (!section) return;
      const track = section.querySelector('.gallery-track');
      if (!track) return;
      // Clear old imgs
      Array.from(track.querySelectorAll('img')).forEach(img => img.remove());
      // Insert in new order
      photoState[id].forEach(imgData => {
        const img = doc.createElement('img');
        img.src = imgData.src;
        img.setAttribute('width', imgData.w);
        img.setAttribute('height', imgData.h);
        img.alt = '';
        track.appendChild(img);
      });
    });

    // Update info-num in each active section to reflect new position
    activeIds.forEach((id, idx) => {
      const section = sectionMap[id];
      if (!section) return;
      const numEl = section.querySelector('.info-num');
      if (numEl) numEl.textContent = String(idx + 1).padStart(2, '0');
    });

    // Remove all gallery sections from DOM, then re-insert in new order
    Object.values(sectionMap).forEach(el => el.remove());
    const mainEl = doc.querySelector('.main');
    const footerEl = doc.querySelector('footer');
    activeIds.forEach(id => {
      if (sectionMap[id]) mainEl.insertBefore(sectionMap[id], footerEl);
    });

    // Rebuild sidebar nav
    const navUl = doc.querySelector('.sidebar-nav ul');
    if (navUl) {
      navUl.innerHTML = '';
      activeIds.forEach((id, idx) => {
        const g = GALLERIES.find(x => x.id === id);
        const num = String(idx + 1).padStart(2, '0');
        const li = doc.createElement('li');
        const a = doc.createElement('a');
        a.href = `#${id}`;
        a.setAttribute('data-section', id);
        // Preserve original link text structure: num span + title
        const numSpan = doc.createElement('span');
        numSpan.className = 'nav-num';
        numSpan.textContent = num;
        a.appendChild(numSpan);
        a.appendChild(doc.createTextNode(g.title));
        li.appendChild(a);
        navUl.appendChild(li);
      });
    }

    // Update heroImages in the script tag
    const heroLines = activeIds.map(id => `    '${photoState[id][0].src}'`).join(',\n');
    doc.querySelectorAll('script').forEach(script => {
      if (script.textContent.includes('heroImages')) {
        script.textContent = script.textContent.replace(
          /const heroImages = \[[\s\S]*?\];/,
          `const heroImages = [\n${heroLines},\n  ];`
        );
      }
    });

    // Serialize and write back
    const newContent = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    const writable = await savedFileHandle.createWritable();
    await writable.write(newContent);
    await writable.close();

    // Commit state
    GALLERIES.forEach(g => {
      photoOriginal[g.id] = photoState[g.id].map(img => ({ ...img }));
    });
    // Update origOrder to reflect saved state
    origOrder.length = 0;
    activeIds.forEach(id => origOrder.push(id));
    deletedAlbums.clear();

    renderSidebar();
    showToast('Saved to index.html', false);
  } catch (err) {
    console.error(err);
    showToast('Save failed — check console', true);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save to index.html';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
