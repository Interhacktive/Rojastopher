<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrange Photos — Rojastopher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --surface: #111;
      --surface2: #181818;
      --border: #1e1e1e;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #c8a96e;
      --red: #a33;
      --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --font-serif: Georgia, 'Times New Roman', serif;
      --sidebar: 240px;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 17px;
      color: var(--accent);
      font-weight: normal;
    }

    .sidebar-header p {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .album-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      padding: 8px 0;
    }

    .album-list::-webkit-scrollbar { display: none; }

    .album-row {
      display: flex;
      align-items: center;
      border-left: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s, opacity 0.2s;
    }

    .album-row.active {
      border-left-color: var(--accent);
      background: rgba(200,169,110,0.06);
    }

    .album-row.drag-over-row {
      border-top: 1px solid var(--accent);
    }

    .album-row.deleted {
      opacity: 0.35;
    }

    .drag-handle {
      padding: 0 6px 0 10px;
      color: var(--border);
      font-size: 13px;
      cursor: grab;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
      align-self: stretch;
      display: flex;
      align-items: center;
    }

    .album-row:hover .drag-handle { opacity: 1; color: var(--muted); }

    .album-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 9px 6px 9px 0;
      text-align: left;
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.15s;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-btn:hover { color: var(--text); }
    .album-row.active .album-btn { color: var(--accent); }
    .album-row.deleted .album-btn { text-decoration: line-through; pointer-events: none; }

    .album-btn .num {
      font-size: 9px;
      color: var(--muted);
      flex-shrink: 0;
      width: 18px;
    }

    .album-row.active .album-btn .num { color: var(--accent); }

    .album-btn .changed-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      display: none;
    }

    .album-row.changed .changed-dot { display: block; }

    .album-action {
      padding: 0 10px 0 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      color: var(--border);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .album-row:hover .album-action { opacity: 1; }
    .album-action.delete:hover { color: var(--red); }
    .album-action.restore { color: var(--accent); opacity: 1; }
    .album-action.restore:hover { color: #d4b97a; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: bold;
    }

    .btn-primary:hover { background: #d4b97a; border-color: #d4b97a; color: #000; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .file-hint {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .file-hint .file-name {
      color: var(--accent);
      display: block;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── MAIN ────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .toolbar h2 {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 18px;
      font-weight: normal;
      color: var(--text);
      flex: 1;
    }

    .toolbar .count {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .toolbar-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .toolbar-btn:hover { border-color: var(--text); color: var(--text); }

    /* ── GRID ────────────────────────────────────────────── */
    .grid-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 6px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: grab;
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.15s;
      user-select: none;
    }

    .photo-item[data-landscape] { aspect-ratio: 3/2; }

    .photo-item:hover { border-color: var(--muted); }
    .photo-item.dragging { opacity: 0.3; cursor: grabbing; }
    .photo-item.drag-over { border-color: var(--accent); border-style: dashed; }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .photo-item .index-badge {
      position: absolute;
      top: 5px; left: 5px;
      background: rgba(0,0,0,0.75);
      color: var(--accent);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 5px;
      pointer-events: none;
    }

    .photo-item .preview-badge {
      position: absolute;
      top: 5px; right: 5px;
      background: var(--accent);
      color: #000;
      font-size: 8px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 5px;
      pointer-events: none;
    }

    .photo-item .filename {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: var(--muted);
      font-size: 8px;
      padding: 3px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .photo-item:hover .filename { opacity: 1; }

    /* Set-preview button (star, bottom-left) */
    .set-preview-btn {
      position: absolute;
      bottom: 5px; left: 5px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #555;
      color: var(--accent);
      font-size: 12px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
      pointer-events: none;
    }

    .photo-item:hover .set-preview-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .set-preview-btn:hover {
      background: rgba(200,169,110,0.2);
      border-color: var(--accent);
    }

    /* Remove button (×, bottom-right) */
    .photo-remove {
      position: absolute;
      bottom: 5px; right: 5px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #555;
      color: #ccc;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      pointer-events: none;
    }

    .photo-item:hover .photo-remove {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-remove:hover { background: var(--red); border-color: var(--red); color: #fff; }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      pointer-events: none;
    }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #000;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 8px 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 2000;
    }

    .toast.error { background: #922; color: #fff; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Rojastopher</h1>
    <p>Photo Arranger</p>
  </div>
  <div class="album-list" id="albumList"></div>
  <div class="sidebar-footer">
    <button class="btn" id="loadBtn">Link to index.html</button>
    <button class="btn" id="resetBtn">Reset Current</button>
    <button class="btn btn-primary" id="saveBtn" disabled>Save to index.html</button>
    <div class="file-hint" id="fileHint">Link to index.html to begin</div>
  </div>
</aside>

<div class="main">
  <div class="toolbar">
    <h2 id="albumTitle">Select an album</h2>
    <span class="count" id="albumCount"></span>
    <button class="toolbar-btn" id="reverseBtn">Reverse Order</button>
  </div>
  <div class="grid-area" id="gridArea">
    <div class="photo-grid" id="photoGrid"></div>
    <div class="empty-state" id="emptyState">&#8592; Link to index.html to begin</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let GALLERIES = [];          // populated by linkToIndexHtml()

const photoState    = {};    // id → current photo array
const photoOriginal = {};    // id → photo array as loaded (for change detection)
const previewIdx    = {};    // id → index of preview/hero image
const previewIdxOrig = {};   // id → previewIdx as loaded (for change detection)

let albumOrder    = [];
let origOrder     = [];
const deletedAlbums = new Set();

let activeId        = null;
let savedFileHandle = null;

// ── LOAD FROM INDEX.HTML ──────────────────────────────────────────
document.getElementById('loadBtn').addEventListener('click', linkToIndexHtml);

async function linkToIndexHtml() {
  if (!window.showOpenFilePicker) {
    showToast('File System API not supported — use Chrome/Edge', true);
    return;
  }
  let fh;
  try {
    [fh] = await window.showOpenFilePicker({
      types: [{ description: 'HTML Files', accept: { 'text/html': ['.html'] } }],
    });
  } catch { return; }

  const content = await (await fh.getFile()).text();
  const doc = new DOMParser().parseFromString(content, 'text/html');

  // Build GALLERIES from DOM order (= display order after arranger saves)
  GALLERIES = [];
  doc.querySelectorAll('.gallery-outer[id]').forEach(section => {
    const id = section.id;
    const track = section.querySelector('.gallery-track');
    if (!track) return;
    GALLERIES.push({
      id,
      title: track.dataset.title || id,
      images: Array.from(track.querySelectorAll('img')).map(img => ({
        src: img.getAttribute('src'),
        w: +img.getAttribute('width') || 0,
        h: +img.getAttribute('height') || 0,
      })),
    });
  });

  if (!GALLERIES.length) {
    showToast('No gallery sections found in that file', true);
    return;
  }

  // Initialise per-album state
  GALLERIES.forEach(g => {
    photoState[g.id]     = g.images.map(i => ({ ...i }));
    photoOriginal[g.id]  = g.images.map(i => ({ ...i }));
    previewIdx[g.id]     = 0;
    previewIdxOrig[g.id] = 0;
  });
  albumOrder = GALLERIES.map(g => g.id);
  origOrder  = [...albumOrder];
  deletedAlbums.clear();

  // Restore preview selections from the heroImages array in the script
  const scriptText = Array.from(doc.querySelectorAll('script'))
    .map(s => s.textContent).find(t => t.includes('heroImages')) || '';
  const m = scriptText.match(/const heroImages\s*=\s*\[([\s\S]*?)\];/);
  if (m) {
    const srcs = [...m[1].matchAll(/'([^']+)'/g)].map(x => x[1]);
    GALLERIES.forEach((g, i) => {
      const heroSrc = srcs[i];
      if (!heroSrc) return;
      const idx = photoState[g.id].findIndex(img => img.src === heroSrc);
      const resolved = idx >= 0 ? idx : 0;
      previewIdx[g.id]     = resolved;
      previewIdxOrig[g.id] = resolved;
    });
  }

  savedFileHandle = fh;
  document.getElementById('fileHint').innerHTML =
    `Linked: <span class="file-name">${fh.name}</span>`;
  document.getElementById('saveBtn').disabled = false;

  // Reset UI
  activeId = null;
  document.getElementById('albumTitle').textContent = 'Select an album';
  document.getElementById('albumCount').textContent = '';
  strip.innerHTML = '';
  const es = document.getElementById('emptyState');
  es.style.display = '';
  es.textContent   = '\u2190 Select an album to begin';

  renderSidebar();
  showToast(`Loaded ${GALLERIES.length} albums`, false);
}

// ── SIDEBAR ───────────────────────────────────────────────────────
let sidebarDragSrc = null;

function renderSidebar() {
  const list = document.getElementById('albumList');
  list.innerHTML = '';
  if (!GALLERIES.length) return;

  albumOrder.forEach((id, idx) => {
    const g = GALLERIES.find(x => x.id === id);
    if (!g) return;

    const visibleIdx = albumOrder
      .slice(0, idx + 1)
      .filter(i => !deletedAlbums.has(i))
      .indexOf(id);
    const num   = String(visibleIdx + 1).padStart(2, '0');
    const isDel = deletedAlbums.has(id);

    const photoChanged =
      photoState[id].length !== photoOriginal[id].length ||
      photoState[id].some((img, i) => img.src !== photoOriginal[id][i]?.src) ||
      (previewIdx[id] ?? 0) !== (previewIdxOrig[id] ?? 0);
    const structureChanged = isDel || idx !== origOrder.indexOf(id);

    const row = document.createElement('div');
    row.className = 'album-row' +
      (id === activeId && !isDel ? ' active' : '') +
      (isDel ? ' deleted' : '') +
      ((photoChanged || structureChanged) ? ' changed' : '');
    row.dataset.id = id;

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '\u2837';
    handle.setAttribute('draggable', 'false');

    const btn = document.createElement('button');
    btn.className = 'album-btn';
    btn.innerHTML =
      `<span class="num">${isDel ? '\u2014' : num}</span>${g.title}<span class="changed-dot"></span>`;
    if (!isDel) btn.addEventListener('click', () => selectAlbum(id));

    const action = document.createElement('button');
    if (isDel) {
      action.className = 'album-action restore';
      action.textContent = '\u21ba';
      action.title = 'Restore album';
      action.addEventListener('click', e => { e.stopPropagation(); restoreAlbum(id); });
    } else {
      action.className = 'album-action delete';
      action.textContent = '\xd7';
      action.title = 'Remove from site';
      action.addEventListener('click', e => { e.stopPropagation(); deleteAlbum(id); });
    }

    row.appendChild(handle);
    row.appendChild(btn);
    row.appendChild(action);

    row.draggable = true;
    row.addEventListener('dragstart', e => {
      sidebarDragSrc = idx;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setDragImage(row, 20, 14);
      setTimeout(() => row.style.opacity = '0.4', 0);
    });
    row.addEventListener('dragend', () => {
      row.style.opacity = '';
      list.querySelectorAll('.album-row').forEach(r => r.classList.remove('drag-over-row'));
    });
    row.addEventListener('dragover', e => {
      if (sidebarDragSrc === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      list.querySelectorAll('.album-row').forEach(r => r.classList.remove('drag-over-row'));
      row.classList.add('drag-over-row');
    });
    row.addEventListener('drop', e => {
      if (sidebarDragSrc === null) return;
      e.preventDefault();
      const destIdx = idx;
      if (sidebarDragSrc === destIdx) return;
      const [moved] = albumOrder.splice(sidebarDragSrc, 1);
      albumOrder.splice(destIdx, 0, moved);
      sidebarDragSrc = null;
      renderSidebar();
    });

    list.appendChild(row);
  });
}

function selectAlbum(id) {
  activeId = id;
  document.getElementById('emptyState').style.display = 'none';
  renderSidebar();
  renderGrid(id);
}

function deleteAlbum(id) {
  deletedAlbums.add(id);
  if (activeId === id) {
    activeId = null;
    document.getElementById('albumTitle').textContent = 'Select an album';
    document.getElementById('albumCount').textContent = '';
    document.getElementById('photoGrid').innerHTML = '';
    document.getElementById('emptyState').style.display = '';
  }
  renderSidebar();
}

function restoreAlbum(id) {
  deletedAlbums.delete(id);
  renderSidebar();
}

// ── GRID ──────────────────────────────────────────────────────────
const strip   = document.getElementById('photoGrid');
const titleEl = document.getElementById('albumTitle');
const countEl = document.getElementById('albumCount');

let photoDragSrc = null;

function renderGrid(id) {
  const g   = GALLERIES.find(x => x.id === id);
  titleEl.textContent = g.title;
  const imgs = photoState[id];
  const pi   = previewIdx[id] ?? 0;
  countEl.textContent = imgs.length + ' photos';
  strip.innerHTML = '';

  imgs.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.draggable = true;
    item.dataset.index = i;
    if (img.w > img.h) item.dataset.landscape = '1';

    // Position number badge
    const badge = document.createElement('span');
    badge.className = 'index-badge';
    badge.textContent = i + 1;

    const image = document.createElement('img');
    image.src = img.src;
    image.loading = 'lazy';

    const fname = document.createElement('span');
    fname.className = 'filename';
    fname.textContent = img.src.split('/').pop();

    item.appendChild(badge);
    item.appendChild(image);
    item.appendChild(fname);

    // Preview badge on selected image; star button on all others
    if (i === pi) {
      const preview = document.createElement('span');
      preview.className = 'preview-badge';
      preview.textContent = 'Preview';
      item.appendChild(preview);
    } else {
      const setBtn = document.createElement('span');
      setBtn.className = 'set-preview-btn';
      setBtn.textContent = '\u2605';
      setBtn.title = 'Set as hero preview image';
      setBtn.addEventListener('click', e => {
        e.stopPropagation();
        previewIdx[id] = i;
        renderGrid(id);
        renderSidebar();
      });
      item.appendChild(setBtn);
    }

    // Remove button (×, bottom-right)
    const removeBtn = document.createElement('span');
    removeBtn.className = 'photo-remove';
    removeBtn.textContent = '\xd7';
    removeBtn.title = 'Remove photo';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      const curPi = previewIdx[id] ?? 0;
      photoState[id].splice(i, 1);
      if (i < curPi)        previewIdx[id] = curPi - 1;
      else if (i === curPi) previewIdx[id] = 0;
      renderGrid(id);
      renderSidebar();
    });
    item.appendChild(removeBtn);

    // Drag-to-reorder
    item.addEventListener('dragstart', e => {
      photoDragSrc = i;
      sidebarDragSrc = null;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      photoDragSrc = null;
      item.classList.remove('dragging');
      strip.querySelectorAll('.photo-item').forEach(el => el.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      if (photoDragSrc === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      strip.querySelectorAll('.photo-item').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', e => {
      if (photoDragSrc === null) return;
      e.preventDefault();
      const destIdx = parseInt(item.dataset.index);
      if (photoDragSrc === destIdx) return;
      const arr   = photoState[id];
      const curPi = previewIdx[id] ?? 0;
      const [moved] = arr.splice(photoDragSrc, 1);
      arr.splice(destIdx, 0, moved);
      // Keep previewIdx pointing at the same photo after the reorder
      if (photoDragSrc === curPi) {
        previewIdx[id] = destIdx;
      } else if (photoDragSrc < curPi && destIdx >= curPi) {
        previewIdx[id] = curPi - 1;
      } else if (photoDragSrc > curPi && destIdx <= curPi) {
        previewIdx[id] = curPi + 1;
      }
      renderGrid(id);
      renderSidebar();
    });

    strip.appendChild(item);
  });
}

// ── TOOLBAR ───────────────────────────────────────────────────────
document.getElementById('reverseBtn').addEventListener('click', () => {
  if (!activeId) return;
  const curPi = previewIdx[activeId] ?? 0;
  const len   = photoState[activeId].length;
  photoState[activeId].reverse();
  previewIdx[activeId] = len - 1 - curPi;
  renderGrid(activeId);
  renderSidebar();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!activeId) return;
  photoState[activeId]  = photoOriginal[activeId].map(img => ({ ...img }));
  previewIdx[activeId]  = previewIdxOrig[activeId] ?? 0;
  renderGrid(activeId);
  renderSidebar();
});

// ── SAVE TO INDEX.HTML ────────────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', saveToIndexHtml);

async function saveToIndexHtml() {
  if (!GALLERIES.length) {
    showToast('Link to index.html first', true);
    return;
  }

  const activeIds = albumOrder.filter(id => !deletedAlbums.has(id));

  const anyChange =
    deletedAlbums.size > 0 ||
    albumOrder.some((id, i) => id !== origOrder[i]) ||
    GALLERIES.some(g =>
      photoState[g.id].length !== photoOriginal[g.id].length ||
      photoState[g.id].some((img, i) => img.src !== photoOriginal[g.id][i]?.src) ||
      (previewIdx[g.id] ?? 0) !== (previewIdxOrig[g.id] ?? 0)
    );

  if (!anyChange) {
    showToast('No changes to save', false);
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving\u2026';

  try {
    const file    = await savedFileHandle.getFile();
    const content = await file.text();
    const parser  = new DOMParser();
    const doc     = parser.parseFromString(content, 'text/html');

    // Index existing sections
    const sectionMap = {};
    doc.querySelectorAll('.gallery-outer[id]').forEach(el => { sectionMap[el.id] = el; });

    // Update photo order inside each track
    activeIds.forEach(id => {
      const section = sectionMap[id];
      if (!section) return;
      const track = section.querySelector('.gallery-track');
      if (!track) return;
      Array.from(track.querySelectorAll('img')).forEach(img => img.remove());
      photoState[id].forEach(imgData => {
        const img = doc.createElement('img');
        img.src = imgData.src;
        img.setAttribute('width', imgData.w);
        img.setAttribute('height', imgData.h);
        img.alt = '';
        track.appendChild(img);
      });
    });

    // Update position numbers
    activeIds.forEach((id, idx) => {
      const section = sectionMap[id];
      if (!section) return;
      const numEl = section.querySelector('.info-num');
      if (numEl) numEl.textContent = String(idx + 1).padStart(2, '0');
    });

    // Re-insert sections in new order
    Object.values(sectionMap).forEach(el => el.remove());
    const mainEl   = doc.querySelector('.main');
    const footerEl = doc.querySelector('footer');
    activeIds.forEach(id => {
      if (sectionMap[id]) mainEl.insertBefore(sectionMap[id], footerEl);
    });

    // Rebuild sidebar nav
    const navUl = doc.querySelector('.sidebar-nav ul');
    if (navUl) {
      navUl.innerHTML = '';
      activeIds.forEach((id, idx) => {
        const g   = GALLERIES.find(x => x.id === id);
        const num = String(idx + 1).padStart(2, '0');
        const li  = doc.createElement('li');
        const a   = doc.createElement('a');
        a.href = `#${id}`;
        a.setAttribute('data-section', id);
        const numSpan = doc.createElement('span');
        numSpan.className = 'nav-num';
        numSpan.textContent = num;
        a.appendChild(numSpan);
        a.appendChild(doc.createTextNode(g.title));
        li.appendChild(a);
        navUl.appendChild(li);
      });
    }

    // Update heroImages using previewIdx (not necessarily index 0)
    const heroLines = activeIds.map(id => {
      const pi  = previewIdx[id] ?? 0;
      const src = photoState[id][pi]?.src || photoState[id][0]?.src;
      return `    '${src}'`;
    }).join(',\n');

    doc.querySelectorAll('script').forEach(script => {
      if (script.textContent.includes('heroImages')) {
        script.textContent = script.textContent.replace(
          /const heroImages = \[[\s\S]*?\];/,
          `const heroImages = [\n${heroLines},\n  ];`
        );
      }
    });

    // Keep galleryOrder in sync so JS reorder is a no-op
    doc.querySelectorAll('script').forEach(script => {
      if (script.textContent.includes('galleryOrder')) {
        const idList = activeIds.map(id => `    '${id}'`).join(',\n');
        script.textContent = script.textContent.replace(
          /const galleryOrder = \[[\s\S]*?\];/,
          `const galleryOrder = [\n${idList}\n  ];`
        );
      }
    });

    // Write file
    const newContent = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    const writable   = await savedFileHandle.createWritable();
    await writable.write(newContent);
    await writable.close();

    // Commit state so change-dots clear
    GALLERIES.forEach(g => {
      photoOriginal[g.id]  = photoState[g.id].map(img => ({ ...img }));
      previewIdxOrig[g.id] = previewIdx[g.id] ?? 0;
    });
    origOrder.length = 0;
    activeIds.forEach(id => origOrder.push(id));
    deletedAlbums.clear();

    renderSidebar();
    showToast('Saved to index.html', false);
  } catch (err) {
    console.error(err);
    showToast('Save failed \u2014 check console', true);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save to index.html';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
